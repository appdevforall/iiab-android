name: Build static binaries (PRoot)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0'

jobs:
  build-binaries:
    name: Compile static termux packages
    runs-on: ubuntu-latest

    steps:
    - name: Checkout project code
      uses: actions/checkout@v4

    - name: Grant execute permission to builder script
      run: chmod +x tools/proot-builder/build_static.sh

    - name: Run Compilation (this will take awhile)
      run: |
        ./tools/proot-builder/build_static.sh --rebuild-all \
          --build-dir ${{ github.workspace }}/termux-build \
          --out-dir ${{ github.workspace }}/termux-artifacts

    - name: Save artifacts to GitHub panel
      uses: actions/upload-artifact@v4
      with:
        name: termux-ninja-binaries
        path: ${{ github.workspace }}/termux-artifacts/

  # Gate: run the binary contract/smoke tests on the freshly built bundle.
  # arm64-v8a runs natively on the ARM runner (faithful proot launch); the
  # 32-bit arch is emulated via QEMU (proot is version-only there). A failure
  # here blocks the publish job below, so a broken rebuild is never released.
  smoke-test:
    name: Smoke/contract test (ADFA-4465)
    needs: build-binaries
    runs-on: ubuntu-24.04-arm
    steps:
    - name: Checkout project code
      uses: actions/checkout@v4

    - name: Download freshly built binaries
      uses: actions/download-artifact@v4
      with:
        name: termux-ninja-binaries
        path: ${{ github.workspace }}/artifacts

    - name: Tools for the proot launch + emulation fallback
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y busybox-static qemu-user-static binfmt-support
        chmod +x tools/smoke-native-binaries.sh

    - name: Register binfmt (QEMU) for foreign-arch binaries
      uses: docker/setup-qemu-action@v3

    - name: Contract test — arm64-v8a (native)
      run: ./tools/smoke-native-binaries.sh --jnilibs "${{ github.workspace }}/artifacts" --arch arm64-v8a

    - name: Contract test — armeabi-v7a (emulated)
      run: ./tools/smoke-native-binaries.sh --jnilibs "${{ github.workspace }}/artifacts" --arch armeabi-v7a

  publish:
    name: Publish rolling release
    needs: [build-binaries, smoke-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download built binaries
      uses: actions/download-artifact@v4
      with:
        name: termux-ninja-binaries
        path: ${{ github.workspace }}/termux-artifacts

    - name: Zip binaries for release distribution
      run: |
        cd ${{ github.workspace }}/termux-artifacts
        zip -r ../termux-binaries-latest.zip .

    - name: Generate dynamic tag (date & time)
      run: echo "TAG_NAME=binaries-$(date +'%Y-%m-%d_%H-%M')" >> $GITHUB_ENV

    - name: Publish rolling release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.TAG_NAME }}
        name: "Static binaries [${{ env.TAG_NAME }}]"
        body: "Automated rolling build of static PRoot and utilities. Passed the native-binary contract/smoke gate (ADFA-4465)."
        files: ${{ github.workspace }}/termux-binaries-latest.zip
        prerelease: true

    - name: Cleanup old nightly builds (Keep Last 3)
      uses: dev-drprasad/delete-older-releases@v0.3.3
      with:
        keep_latest: 3
        delete_tags: true
        delete_tag_pattern: "^binaries-"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
